<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Hero Section</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0a0e2e; /* Dark navy background */
            color: #ffffff;
            overflow-x: hidden;
        }

        /* Hero Section Container */
        .hero-section {
            position: relative;
            width: 100%;
            min-height: 520px;
            height: 100vh; /* Full viewport height for better effect */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background-color: #0a0e2e;
        }

        /* Three.js Canvas Container */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0; /* Behind content */
            pointer-events: none; /* Let clicks pass through to content */
        }

        /* Hero Content */
        .hero-content {
            position: relative;
            z-index: 10; /* On top of canvas */
            text-align: center;
            max-width: 800px;
            padding: 0 20px;
            pointer-events: auto;
        }

        .hero-content h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .hero-content p {
            font-size: 1.25rem;
            margin-bottom: 40px;
            color: #94a3b8;
            line-height: 1.6;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background-color: #4f46e5;
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .btn-primary:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.6);
        }

        .btn-outline {
            background-color: transparent;
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-outline:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2.5rem;
            }
            .hero-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <section class="hero-section" id="hero">
        <!-- Three.js Canvas Container -->
        <div id="canvas-container"></div>

        <!-- Hero Content -->
        <div class="hero-content">
            <h1>Build the Future</h1>
            <p>Experience the next generation of web design with immersive 3D environments and interactive elements that captivate your audience.</p>
            <div class="hero-buttons">
                <a href="#" class="btn btn-primary">Get Started</a>
                <a href="#" class="btn btn-outline">Learn More</a>
            </div>
        </div>
    </section>

    <!-- Include Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // --- Setup Scene, Camera, Renderer ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Camera setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        // Renderer setup with alpha: true for transparent background
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // --- 1. 300 Floating Particles (Points) ---
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 300;
        const posArray = new Float32Array(particlesCount * 3);
        const randomOffsets = new Float32Array(particlesCount); // For pulsing effect

        for(let i = 0; i < particlesCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100; // Spread across -50 to 50
        }
        for(let i = 0; i < particlesCount; i++) {
            randomOffsets[i] = Math.random() * Math.PI * 2;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('aOffset', new THREE.BufferAttribute(randomOffsets, 1));

        // Custom shader material for pulsing opacity
        const particlesMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                color: { value: new THREE.Color(0xffffff) }
            },
            vertexShader: `
                attribute float aOffset;
                varying float vOffset;
                void main() {
                    vOffset = aOffset;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = (80.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec3 color;
                varying float vOffset;
                void main() {
                    // Circular particle
                    float dist = distance(gl_PointCoord, vec2(0.5));
                    if(dist > 0.5) discard;
                    
                    // Pulsing opacity
                    float alpha = (sin(time * 2.0 + vOffset) * 0.5 + 0.5) * 0.6 + 0.1;
                    
                    // Soft edge
                    alpha *= (1.0 - (dist * 2.0));
                    
                    gl_FragColor = vec4(color, alpha);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // --- 2. Wireframe Icosahedron (large, left side) ---
        const icoGeometry = new THREE.IcosahedronGeometry(8, 1);
        const icoMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x2244aa, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.18 
        });
        const icosahedron = new THREE.Mesh(icoGeometry, icoMaterial);
        icosahedron.position.set(-20, 0, -10);
        scene.add(icosahedron);

        // --- 3. Wireframe Octahedron (right side) ---
        const octGeometry = new THREE.OctahedronGeometry(6, 0);
        const octMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xf5b800, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.22 
        });
        const octahedron = new THREE.Mesh(octGeometry, octMaterial);
        octahedron.position.set(22, -2, -5);
        scene.add(octahedron);

        // --- 4. Torus Knot (top right, small) ---
        const knotGeometry = new THREE.TorusKnotGeometry(2.5, 0.6, 64, 8);
        const knotMaterial = new THREE.MeshBasicMaterial({ 
            color: 0x4466ff, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.25 
        });
        const torusKnot = new THREE.Mesh(knotGeometry, knotMaterial);
        torusKnot.position.set(15, 12, -15);
        scene.add(torusKnot);

        // --- 5. 30 Random Network Connection Lines ---
        const linesMaterial = new THREE.LineBasicMaterial({ 
            color: 0x334488, 
            transparent: true, 
            opacity: 0.3 
        });
        const linesGeometry = new THREE.BufferGeometry();
        const linePoints = [];
        for (let i = 0; i < 30; i++) {
            // Start point
            linePoints.push(
                (Math.random() - 0.5) * 80,
                (Math.random() - 0.5) * 60,
                (Math.random() - 0.5) * 40 - 10
            );
            // End point
            linePoints.push(
                (Math.random() - 0.5) * 80,
                (Math.random() - 0.5) * 60,
                (Math.random() - 0.5) * 40 - 10
            );
        }
        linesGeometry.setAttribute('position', new THREE.Float32BufferAttribute(linePoints, 3));
        const networkLines = new THREE.LineSegments(linesGeometry, linesMaterial);
        scene.add(networkLines);

        // --- 6. 5 Small Floating Dodecahedra ---
        const dodecahedra = [];
        const colors = [0xff3366, 0x33ccff, 0x33ff66, 0xffcc00, 0xcc33ff];
        
        for (let i = 0; i < 5; i++) {
            const dodGeometry = new THREE.DodecahedronGeometry(1.5 + Math.random());
            const dodMaterial = new THREE.MeshBasicMaterial({ 
                color: colors[i], 
                wireframe: true, 
                transparent: true, 
                opacity: 0.3 
            });
            const mesh = new THREE.Mesh(dodGeometry, dodMaterial);
            
            // Random positions
            mesh.position.set(
                (Math.random() - 0.5) * 50,
                (Math.random() - 0.5) * 30,
                (Math.random() - 0.5) * 20 - 10
            );
            
            // Store random offset for independent bobbing
            mesh.userData = {
                yOffset: Math.random() * Math.PI * 2,
                speed: 0.5 + Math.random() * 0.5,
                baseY: mesh.position.y,
                rotXSpeed: (Math.random() - 0.5) * 0.02,
                rotYSpeed: (Math.random() - 0.5) * 0.02
            };
            
            scene.add(mesh);
            dodecahedra.push(mesh);
        }

        // --- 7. Mouse Parallax Effect ---
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;

        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX);
            mouseY = (event.clientY - windowHalfY);
        });

        // --- Handle Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const elapsedTime = clock.getElapsedTime();

            // Update particles pulsing
            particlesMaterial.uniforms.time.value = elapsedTime;
            
            // Slowly rotate particles container
            particlesMesh.rotation.y = elapsedTime * 0.02;
            particlesMesh.rotation.x = elapsedTime * 0.01;

            // Rotate Icosahedron
            icosahedron.rotation.x += 0.002;
            icosahedron.rotation.y += 0.003;

            // Rotate Octahedron (opposite direction)
            octahedron.rotation.x -= 0.004;
            octahedron.rotation.y -= 0.002;

            // Rotate Torus Knot (X and Y axes)
            torusKnot.rotation.x += 0.005;
            torusKnot.rotation.y += 0.008;

            // Slowly rotate network lines
            networkLines.rotation.y = elapsedTime * 0.015;

            // Bobbing Dodecahedra
            dodecahedra.forEach(mesh => {
                const data = mesh.userData;
                // Bobbing up and down using Math.sin(t)
                mesh.position.y = data.baseY + Math.sin(elapsedTime * data.speed + data.yOffset) * 2;
                // Gentle rotation
                mesh.rotation.x += data.rotXSpeed;
                mesh.rotation.y += data.rotYSpeed;
            });

            // Parallax Camera Movement
            targetX = mouseX * 0.005;
            targetY = mouseY * 0.005;
            
            // Smoothly interpolate camera position
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (-targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
